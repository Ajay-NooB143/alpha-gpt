# Documentation workflow for alpha-gpt
# Auto-generates API documentation with pdoc and deploys it to GitHub Pages.
# Also updates README badges and checks for documentation spelling.
# Triggers: push to main

name: Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Allow only one concurrent Pages deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # 1. Build HTML documentation from source
  # ──────────────────────────────────────────────
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-docs-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-docs-
            ${{ runner.os }}-pip-

      - name: Install project and documentation tools
        run: |
          pip install --upgrade pip
          pip install -e . --quiet || true
          pip install pdoc

      - name: Generate HTML documentation with pdoc
        run: |
          pdoc src/agent \
            --output-dir docs/_build/html \
            --docformat google

      - name: Check README spelling
        uses: codespell-project/actions-codespell@v2
        with:
          ignore_words_file: .codespellignore
          path: README.md

      - name: Upload documentation artifact (for Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  # ──────────────────────────────────────────────
  # 2. Deploy built docs to GitHub Pages
  # ──────────────────────────────────────────────
  deploy-docs:
    name: Deploy Docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs

    permissions:
      pages: write        # required to deploy to Pages
      id-token: write     # required for OIDC token used by Pages

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Post docs URL to job summary
        run: |
          echo "### 📚 Documentation Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [${{ steps.deploy.outputs.page_url }}](${{ steps.deploy.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY
