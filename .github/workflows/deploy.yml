# Deployment workflow for alpha-gpt
# Deploys to production ONLY when a commit is pushed/merged to the main branch.
# After deployment it runs smoke tests and creates a GitHub Release tag.
# Triggers: push to main only

name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Prevent concurrent deployments (only one at a time)
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # 1. Run unit tests before deploying
  # ──────────────────────────────────────────────
  pre-deploy-tests:
    name: Pre-Deploy Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-deploy-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-deploy-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e . --quiet || true
          pip install pytest

      - name: Run unit tests
        run: python -m pytest tests/unit_tests -v

  # ──────────────────────────────────────────────
  # 2. Deploy to production via SSH
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: pre-deploy-tests
    environment: production

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            echo "=== Deploying alpha-gpt to production ==="

            # Navigate to the application directory
            cd /home/${{ secrets.VPS_USER }}/alpha-gpt

            # Pull the latest code from main
            git fetch --all --prune
            git reset --hard origin/main

            # Rebuild and restart services
            docker-compose down || true
            docker-compose pull || true
            docker-compose up -d --build --remove-orphans

            echo "=== Deployment complete ==="

      - name: Post deployment summary
        run: |
          echo "### 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # 3. Post-deployment smoke test
  # ──────────────────────────────────────────────
  post-deploy-tests:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e . --quiet || true
          pip install pytest

      - name: Run smoke / integration tests
        run: python -m pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # 4. Create a GitHub Release tag
  # ──────────────────────────────────────────────
  create-release:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: post-deploy-tests

    permissions:
      contents: write   # required to create tags and releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for tagging

      - name: Generate release version
        id: version
        run: |
          # Use UTC timestamp as the patch version: vYYYY.MM.DD-HHMMSS
          VERSION="v$(date -u +'%Y.%m.%d-%H%M%S')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Release ${{ steps.version.outputs.version }}"
          body: |
            ## 🚀 Automated Release

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Actor:** `${{ github.actor }}`

            Deployed to production successfully.
          draft: false
          prerelease: false
